<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Study Schedule</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        
         :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface-2: #f1f3f5;
            --border: #e0e0e0;
            --border-strong: #bdbdbd;
            --text: #1a1a1a;
            --text-secondary: #555;
            --text-muted: #888;
            --accent: #4361ee;
            --accent-bg: #eef0fd;
            --accent-text: #3451d1;
            --success: #2dc653;
            --success-bg: #e6f9ec;
            --success-text: #1a7a35;
            --warning-bg: #fff8e6;
            --warning-text: #b77a00;
            --purple-bg: #f0eeff;
            --purple-text: #534ab7;
            --pro-bg: #f5eeff;
            --pro-text: #7c3aed;
            --radius: 8px;
        }
        
        @media(prefers-color-scheme:dark) {
             :root {
                --bg: #111;
                --surface: #1e1e1e;
                --surface-2: #252525;
                --border: #333;
                --border-strong: #444;
                --text: #f0f0f0;
                --text-secondary: #aaa;
                --text-muted: #666;
                --accent: #6b80f5;
                --accent-bg: #1a1f3e;
                --accent-text: #8fa0ff;
                --success: #2dc653;
                --success-bg: #0d2a16;
                --success-text: #5de485;
                --warning-bg: #2a200a;
                --warning-text: #f0b429;
                --purple-bg: #1e1a40;
                --purple-text: #a69bff;
                --pro-bg: #1f1235;
                --pro-text: #c084fc;
            }
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 1rem
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto
        }
        
        .app-header {
            text-align: center;
            padding: 1.5rem 0 0.5rem
        }
        
        .app-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text)
        }
        
        .app-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px
        }
        
        .cal-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 0 1rem
        }
        
        .cal-nav h2 {
            font-size: 18px;
            font-weight: 500
        }
        
        .nav-btn {
            background: none;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 7px 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 15px;
            transition: background 0.15s
        }
        
        .nav-btn:hover {
            background: var(--surface-2)
        }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 4px
        }
        
        .weekday {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 0;
            font-weight: 600;
            letter-spacing: 0.04em
        }
        
        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px
        }
        
        .day-cell {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            min-height: 62px;
            padding: 6px;
            cursor: pointer;
            background: var(--surface);
            transition: border-color 0.15s, background 0.15s
        }
        
        .day-cell:hover {
            border-color: var(--accent);
            background: var(--accent-bg)
        }
        
        .day-cell.empty {
            background: transparent;
            border: none;
            cursor: default
        }
        
        .day-cell.today {
            border-color: var(--accent);
            background: var(--accent-bg)
        }
        
        .day-cell.selected {
            border-color: var(--accent);
            border-width: 2px;
            background: var(--accent-bg)
        }
        
        .day-num {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 5px
        }
        
        .day-cell.today .day-num {
            color: var(--accent-text);
            font-weight: 700
        }
        
        .progress-dots {
            display: flex;
            gap: 3px;
            flex-wrap: wrap
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--border-strong);
            flex-shrink: 0
        }
        
        .dot.done {
            background: var(--success)
        }
        
        .panel {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            padding: 1.25rem;
            margin-top: 1rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06)
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 6px
        }
        
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text)
        }
        
        .panel-date {
            font-size: 13px;
            color: var(--text-muted)
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface-2);
            cursor: pointer;
            transition: all 0.15s;
            user-select: none
        }
        
        .task-item:hover {
            border-color: var(--border-strong)
        }
        
        .task-item.checked {
            opacity: 0.55
        }
        
        .task-item.checked .task-label {
            text-decoration: line-through;
            color: var(--text-muted)
        }
        
        .cb {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 1.5px solid var(--border-strong);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            background: var(--surface)
        }
        
        .task-item.checked .cb {
            background: var(--success);
            border-color: var(--success)
        }
        
        .cb svg {
            display: none;
            width: 12px;
            height: 12px;
            stroke: #fff;
            stroke-width: 3;
            fill: none
        }
        
        .task-item.checked .cb svg {
            display: block
        }
        
        .task-label {
            flex: 1;
            font-size: 14px;
            color: var(--text);
            line-height: 1.4
        }
        
        .time-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: var(--radius);
            font-weight: 600;
            white-space: nowrap
        }
        
        .badge-morning {
            background: var(--warning-bg);
            color: var(--warning-text)
        }
        
        .badge-study {
            background: var(--accent-bg);
            color: var(--accent-text)
        }
        
        .badge-break {
            background: var(--success-bg);
            color: var(--success-text)
        }
        
        .badge-evening {
            background: var(--pro-bg);
            color: var(--pro-text)
        }
        
        .badge-night {
            background: var(--purple-bg);
            color: var(--purple-text)
        }
        
        .progress-bar-wrap {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border)
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px
        }
        
        .progress-bar {
            height: 7px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden
        }
        
        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 4px;
            transition: width 0.35s
        }
        
        .streak-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--accent-bg);
            border-radius: var(--radius);
            margin-bottom: 1rem;
            font-size: 13px;
            color: var(--accent-text);
            font-weight: 500
        }
        
        @media(max-width:480px) {
            .time-badge {
                display: none
            }
            .day-cell {
                min-height: 52px;
                padding: 4px
            }
            .day-num {
                font-size: 12px
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="app-header">
            <h1>📚 DSA Study Schedule</h1>
            <p>Click any date to view and track your daily tasks</p>
        </div>

        <div class="streak-bar" id="streak-bar">
            🔥 <span id="streak-text">Loading streak...</span>
        </div>

        <div class="cal-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
            <h2 id="month-label"></h2>
            <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
        </div>
        <div class="weekdays">
            <div class="weekday">Sun</div>
            <div class="weekday">Mon</div>
            <div class="weekday">Tue</div>
            <div class="weekday">Wed</div>
            <div class="weekday">Thu</div>
            <div class="weekday">Fri</div>
            <div class="weekday">Sat</div>
        </div>
        <div class="days-grid" id="days-grid"></div>

        <div class="panel" id="task-panel" style="display:none">
            <div class="panel-header">
                <span class="panel-title" id="panel-title"></span>
                <span class="panel-date" id="panel-date"></span>
            </div>
            <div class="task-list" id="task-list"></div>
            <div class="progress-bar-wrap">
                <div class="progress-label">
                    <span>Daily progress</span>
                    <span id="progress-text"></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TASKS = [{
            id: 't1',
            label: 'Wake up & solve 1 DSA problem',
            time: '8:00 – 9:00 AM',
            badge: 'badge-morning'
        }, {
            id: 't2',
            label: 'Break — eat breakfast & relax',
            time: '9:00 – 10:00 AM',
            badge: 'badge-break'
        }, {
            id: 't3',
            label: 'Read & study (core concepts)',
            time: '11:00 AM – 2:00 PM',
            badge: 'badge-study'
        }, {
            id: 't4',
            label: 'Extended reading session',
            time: '2:00 – 3:00 PM',
            badge: 'badge-study'
        }, {
            id: 't5',
            label: 'Afternoon break',
            time: '3:00 – 5:00 PM',
            badge: 'badge-break'
        }, {
            id: 't6',
            label: 'Learn new concepts / topics',
            time: '5:00 – 8:00 PM',
            badge: 'badge-evening'
        }, {
            id: 't7',
            label: 'DSA practice session',
            time: '9:00 PM – 12:00 AM',
            badge: 'badge-night'
        }, ];

        const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        let state = {};
        let cur = new Date();
        let selDate = null;

        function key(d) {
            return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
        }

        function load() {
            try {
                state = JSON.parse(localStorage.getItem('dsa_v2') || '{}');
            } catch (e) {
                state = {};
            }
        }

        function save() {
            try {
                localStorage.setItem('dsa_v2', JSON.stringify(state));
            } catch (e) {}
        }

        function getDone(d) {
            const k = key(d);
            if (!state[k]) return 0;
            return TASKS.filter(t => state[k][t.id]).length;
        }

        function getStreak() {
            let streak = 0;
            const today = new Date();
            for (let i = 0; i < 365; i++) {
                const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
                if (getDone(d) === TASKS.length) streak++;
                else if (i > 0) break;
            }
            return streak;
        }

        function changeMonth(dir) {
            cur = new Date(cur.getFullYear(), cur.getMonth() + dir, 1);
            selDate = null;
            render();
        }

        function selectDay(dk) {
            selDate = selDate === dk ? null : dk;
            render();
        }

        function toggleTask(dateKey, tid) {
            if (!state[dateKey]) state[dateKey] = {};
            state[dateKey][tid] = !state[dateKey][tid];
            save();
            render();
        }

        function render() {
            const today = new Date();
            const todayKey = key(today);

            document.getElementById('month-label').textContent = MONTHS[cur.getMonth()] + ' ' + cur.getFullYear();

            const streak = getStreak();
            document.getElementById('streak-text').textContent = streak > 0 ? `${streak}-day streak! Keep going!` : 'Complete all tasks today to start your streak!';

            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            const first = new Date(cur.getFullYear(), cur.getMonth(), 1);
            const last = new Date(cur.getFullYear(), cur.getMonth() + 1, 0);
            const startDay = first.getDay();

            for (let i = 0; i < startDay; i++) {
                const e = document.createElement('div');
                e.className = 'day-cell empty';
                grid.appendChild(e);
            }

            for (let d = 1; d <= last.getDate(); d++) {
                const date = new Date(cur.getFullYear(), cur.getMonth(), d);
                const dk = key(date);
                const cell = document.createElement('div');
                let cls = 'day-cell';
                if (dk === todayKey) cls += ' today';
                if (dk === selDate) cls += ' selected';
                cell.className = cls;
                cell.onclick = () => selectDay(dk);
                const dotHtml = TASKS.map(t => `<div class="dot${state[dk]&&state[dk][t.id]?' done':''}"></div>`).join('');
                cell.innerHTML = `<div class="day-num">${d}</div><div class="progress-dots">${dotHtml}</div>`;
                grid.appendChild(cell);
            }

            const panel = document.getElementById('task-panel');
            if (selDate) {
                panel.style.display = 'block';
                const parts = selDate.split('-');
                const sd = new Date(+parts[0], +parts[1] - 1, +parts[2]);
                document.getElementById('panel-title').textContent = DAYS[sd.getDay()] + "'s schedule";
                document.getElementById('panel-date').textContent = MONTHS[sd.getMonth()] + ' ' + sd.getDate() + ', ' + sd.getFullYear();

                const list = document.getElementById('task-list');
                list.innerHTML = '';
                TASKS.forEach(t => {
                    const checked = !!(state[selDate] && state[selDate][t.id]);
                    const item = document.createElement('div');
                    item.className = 'task-item' + (checked ? ' checked' : '');
                    item.onclick = () => toggleTask(selDate, t.id);
                    item.innerHTML = `<div class="cb"><svg viewBox="0 0 12 10"><polyline points="1,5 4.5,9 11,1"/></svg></div><span class="task-label">${t.label}</span><span class="time-badge ${t.badge}">${t.time}</span>`;
                    list.appendChild(item);
                });

                const done = TASKS.filter(t => state[selDate] && state[selDate][t.id]).length;
                const pct = Math.round(done / TASKS.length * 100);
                document.getElementById('progress-text').textContent = done + ' / ' + TASKS.length + ' done';
                document.getElementById('progress-fill').style.width = pct + '%';
                panel.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest'
                });
            } else {
                panel.style.display = 'none';
            }
        }

        load();
        render();
    </script>
</body>

</html>
